# Permanent fail-closed hosted Edge Blueprint template.
# The publication workflow replaces the sole placeholder in its output only.
services:
  - type: web
    name: all-the-context-edge
    runtime: image
    plan: starter
    image:
      url: __ATC_EDGE_IMAGE_REFERENCE__
    healthCheckPath: /healthz
    autoDeploy: false
    numInstances: 1
    envVars:
      - key: ATC_EDGE_BUNDLE
        sync: false
      - key: ATC_RELAY_HOST
        value: 0.0.0.0
      - key: ATC_RELAY_DATABASE
        value: /var/lib/allthecontext/edge.sqlite3
    disk:
      name: all-the-context-edge-data
      mountPath: /var/lib/allthecontext
      sizeGB: 1
