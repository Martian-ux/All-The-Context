# Hosted Edge Blueprint template.
#
# This initial root copy is intentionally not deployable. The Edge image
# workflow reads deploy/edge/render.template.yaml, replaces its sole placeholder
# with the exact public GHCR digest, and emits a reviewed render.yaml artifact.
# Activation later replaces this file; the permanent template remains inert for
# beta2 and later images. Never use a tag or restore a source-build runtime.
services:
  - type: web
    name: all-the-context-edge
    runtime: image
    plan: starter
    image:
      url: __ATC_EDGE_IMAGE_REFERENCE__
    healthCheckPath: /healthz
    autoDeploy: false
    numInstances: 1
    envVars:
      - key: ATC_EDGE_BUNDLE
        sync: false
      - key: ATC_RELAY_HOST
        value: 0.0.0.0
      - key: ATC_RELAY_DATABASE
        value: /var/lib/allthecontext/edge.sqlite3
    disk:
      name: all-the-context-edge-data
      mountPath: /var/lib/allthecontext
      sizeGB: 1
