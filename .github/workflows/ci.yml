name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python 3.12 - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes python3-tk
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff formatting
        run: python -m ruff format --check .
      - name: Ruff lint
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy packages/allthecontext/src
      - name: Documentation checks
        run: python scripts/check_docs.py
      - name: Tests and platform smoke coverage
        run: python -m pytest
      - name: Build Python artifacts
        run: python -m build --outdir dist/python
      - name: Diagnose Python package resources
        run: python scripts/diagnose_python_packages.py --directory dist/python

  dashboard:
    name: Dashboard - Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node: [20, 22]
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

  desktop-package:
    name: Desktop artifact - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            architecture: x86_64
            source: AllTheContextSetup.exe
          - os: macos-26
            platform: macos
            architecture: arm64
            source: AllTheContext.app
          - os: macos-26-intel
            platform: macos
            architecture: x86_64
            source: AllTheContext.app
          - os: ubuntu-latest
            platform: linux
            architecture: x86_64
            source: all-the-context
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Verify native runner architecture label
        run: >-
          python scripts/check_runner_architecture.py
          --expected ${{ matrix.architecture }}
      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes python3-tk
      - name: Install desktop packager
        run: python -m pip install -e ".[packaging]"
      - name: Exercise native startup and OS credential adapters
        if: runner.os != 'Linux'
        run: python scripts/smoke_platform_acceptance.py --require-os-credential
      - name: Exercise Linux startup and explicit credential fallback
        if: runner.os == 'Linux'
        run: python scripts/smoke_platform_acceptance.py
      - name: Build native desktop artifact
        run: python scripts/build_desktop.py
      - name: Smoke-test bundled resources and packaged OS credential access
        run: python scripts/smoke_desktop_artifact.py
      - name: Clean-install, startup, MCP, restart, and cleanup smoke
        run: python scripts/smoke_packaged_first_run.py
      - id: runtime-version
        name: Read runtime version
        shell: python
        run: |
          import os
          from allthecontext import __version__
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={__version__}\n")
      - name: Build direct unsigned platform package
        run: >-
          python scripts/package_desktop.py
          --version ${{ steps.runtime-version.outputs.version }}
          --platform ${{ matrix.platform }}
          --architecture ${{ matrix.architecture }}
          --output-dir dist/platform
      - name: Record AppImage spike decision
        if: runner.os == 'Linux'
        run: >-
          python scripts/evaluate_appimage.py
          --output dist/platform/appimage-evaluation.json
      - name: Smoke-test direct platform package and trust disclosure
        run: >-
          python scripts/smoke_platform_package.py
          --directory dist/platform
          --platform ${{ matrix.platform }}
      - name: Create deterministic candidate archive and metadata
        run: >-
          python scripts/build_release_assets.py
          --source dist/desktop/${{ matrix.source }}
          --output-dir dist/release
          --version ${{ steps.runtime-version.outputs.version }}
          --platform ${{ matrix.platform }}
          --architecture ${{ matrix.architecture }}
      - uses: actions/upload-artifact@v4
        with:
          name: all-the-context-${{ matrix.platform }}-${{ matrix.architecture }}
          path: |
            dist/platform/**
            dist/release/**
          if-no-files-found: error
