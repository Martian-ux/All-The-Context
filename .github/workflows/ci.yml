name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python 3.12 - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes python3-tk
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff formatting
        run: python -m ruff format --check .
      - name: Ruff lint
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy packages/allthecontext/src
      - name: Documentation checks
        run: python scripts/check_docs.py
      - name: Tests and platform smoke coverage
        run: python -m pytest
      - name: Build Python artifacts
        run: python -m build

  dashboard:
    name: Dashboard - Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node: [20, 22]
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

  desktop-package:
    name: Desktop artifact - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes python3-tk
      - name: Install desktop packager
        run: python -m pip install -e ".[packaging]"
      - name: Build native desktop artifact
        run: python scripts/build_desktop.py
      - name: Smoke-test bundled resources
        run: python scripts/smoke_desktop_artifact.py
      - name: Smoke-test first run and packaged MCP
        run: python scripts/smoke_packaged_first_run.py
      - uses: actions/upload-artifact@v4
        with:
          name: all-the-context-${{ matrix.os }}
          path: dist/desktop/**
          if-no-files-found: error

  relay-container:
    name: Relay container
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build hosted Relay image
        run: docker build --file apps/relay/Dockerfile --tag all-the-context-relay:ci .
