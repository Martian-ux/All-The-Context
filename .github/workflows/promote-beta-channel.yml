name: Promote signed beta update channel

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Exact immutable published beta tag
        required: true
        type: string
      source_commit:
        description: Reviewed full 40-character release commit
        required: true
        type: string
      candidate_sha256:
        description: Reviewed SHA-256 of release-candidate-v1.json
        required: true
        type: string
      approval:
        description: Type PROMOTE SIGNED BETA
        required: true
        type: string

concurrency:
  group: beta-update-channel
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      attestations: read
      contents: read
    steps:
      - name: Require deliberate operator phrase
        shell: bash
        env:
          APPROVAL: ${{ inputs.approval }}
        run: test "$APPROVAL" = "PROMOTE SIGNED BETA"
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_commit }}
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e .
      - name: Require immutable published beta release and release attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release view "${{ inputs.tag }}" \
            --json tagName,targetCommitish,isDraft,isImmutable,isPrerelease,assets \
            > dist/release-state.json
          python scripts/release_candidate.py verify-release-state \
            --input dist/release-state.json \
            --tag "${{ inputs.tag }}" \
            --source-commit "${{ inputs.source_commit }}" \
            --draft false \
            --immutable true
          gh release verify "${{ inputs.tag }}"
      - name: Download and match every immutable GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ inputs.tag }}" --dir dist/release
          for asset in dist/release/*; do
            gh release verify-asset "${{ inputs.tag }}" "$asset"
          done
      - name: Verify candidate inventory and all native artifact metadata
        run: >-
          python scripts/release_candidate.py verify
          --release-dir dist/release
          --expected-sha256 "${{ inputs.candidate_sha256 }}"
          --target windows:x86_64
          --target macos:arm64
          --target macos:x86_64
          --target linux:x86_64
          --ota-target windows:x86_64
          --asset-stage promotion
      - name: Match the immutable GitHub asset names to the candidate
        run: >-
          python scripts/release_candidate.py verify-release-state
          --input dist/release-state.json
          --tag "${{ inputs.tag }}"
          --source-commit "${{ inputs.source_commit }}"
          --draft false
          --immutable true
          --release-dir dist/release
          --asset-stage promotion
      - name: Verify all build and SBOM attestations again
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/release-candidate.yml
        run: |
          set -euo pipefail
          for subject in dist/release/*.zip dist/release/*-unsigned.exe dist/release/*-unsigned.dmg dist/release/*-unsigned.tar.gz; do
            [[ -f "$subject" ]] || continue
            gh attestation verify "$subject" \
              --repo "$GITHUB_REPOSITORY" \
              --bundle "$subject.provenance.sigstore.json" \
              --signer-workflow "$SIGNER_WORKFLOW" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
            gh attestation verify "$subject" \
              --repo "$GITHUB_REPOSITORY" \
              --bundle "$subject.sbom.sigstore.json" \
              --predicate-type "https://spdx.dev/Document/v2.3" \
              --signer-workflow "$SIGNER_WORKFLOW" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
          done
      - name: Build Pages artifact only from verified signed manifests
        run: >-
          python scripts/release_channel.py prepare
          --release-dir dist/release
          --candidate-sha256 "${{ inputs.candidate_sha256 }}"
          --repository "${{ github.repository }}"
          --source-commit "${{ inputs.source_commit }}"
          --output-dir dist/pages
      - name: Verify prepared beta channel locally
        run: python scripts/release_channel.py verify --site-dir dist/pages
      - name: Upload verified Pages artifact without enabling Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy after github-pages environment approval
        id: deployment
        uses: actions/deploy-pages@v4
